name: Bug report
description: Report a reproducible problem with NoMore403.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include credentials, tokens, private target data, customer data, or non-public vulnerability details.

        If this is a vulnerability in NoMore403 itself, do not file a public issue. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Paste the release version, commit SHA, or note if you built from the default branch.
      placeholder: "vX.Y.Z or commit SHA"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, shell, and Go version if building from source.
      placeholder: "macOS 15 arm64, zsh, Go 1.24"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command and flags. Redact hostnames or sensitive headers if needed.
      render: shell
      placeholder: "./nomore403 -u https://example.test/admin -v"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include output when safe to share.
      render: text
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproduction you can. Prefer a local or public test target.
      placeholder: |
        1. Build with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add logs, screenshots, request/response shapes, or notes. Redact sensitive details.
    validations:
      required: false
